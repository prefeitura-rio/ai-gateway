apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-gateway-staging

helmCharts:
  - name: base-chart
    repo: https://prefeitura-rio.github.io/charts
    version: 2.3.0
    releaseName: ai-gateway
    valuesInline:
      replicaCount: 1

      image:
        repository: ghcr.io/prefeitura-rio/ai-gateway
        pullPolicy: IfNotPresent
        tag: "latest"

      imagePullSecrets:
        - name: ghcr-credentials

      serviceAccount:
        create: false
        automount: false

      service:
        type: ClusterIP
        port: 80
        containerPort: 8000

      env:
        - name: SERVER_PORT
          value: "8000"
        - name: METRICS_PORT
          value: "8080"
        - name: GIN_MODE
          value: "release"
        - name: LOG_LEVEL
          value: "debug"
        - name: LOG_FORMAT
          value: "json"

      istio:
        enabled: true

      resources:
        requests:
          ephemeral-storage: 500Mi
          cpu: 500m
          memory: 1Gi
        limits:
          ephemeral-storage: 2Gi
          cpu: 2000m
          memory: 2Gi

      readinessProbe:
        httpGet:
          path: /ready
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

      livenessProbe:
        httpGet:
          path: /live
          port: 8000
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3

      infisicalSecret:
        enabled: true
        secretName: "ai-gateway-secrets"
        projectSlug: "ai-gateway-x5-yk"
        envSlug: "staging"

      envFrom:
        - secretRef:
            name: ai-gateway-secrets

      podAnnotations:
        secrets.infisical.com/auto-reload: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      podDisruptionBudget:
        enabled: true
        minAvailable: 1

      autoscaling:
        enabled: false

      rabbitmq:
        enabled: true
        replicaCount: 1
        persistence:
          enabled: true
          size: 8Gi
        auth:
          enabled: true
          existingSecret: "ai-gateway-secrets"
          existingPasswordKey: "RABBITMQ_PASSWORD"
        managementPlugin:
          enabled: true
        metrics:
          enabled: true
          port: 15692
        service:
          type: ClusterIP
          amqpPort: 5672
          managementPort: 15672

      valkey:
        enabled: true
        architecture: standalone
        replicaCount: 1
        persistence:
          enabled: true
          size: 8Gi
        auth:
          enabled: true
          existingSecret: "ai-gateway-secrets"
          existingSecretPasswordKey: "REDIS_PASSWORD"

  - name: base-chart
    repo: https://prefeitura-rio.github.io/charts
    version: 2.3.0
    releaseName: ai-gateway-worker
    valuesInline:
      replicaCount: 1

      image:
        repository: ghcr.io/prefeitura-rio/ai-gateway
        pullPolicy: IfNotPresent
        tag: "latest"

      imagePullSecrets:
        - name: ghcr-credentials

      serviceAccount:
        create: false
        automount: false

      service:
        type: ClusterIP
        port: 80
        containerPort: 8000

      env:
        - name: LOG_LEVEL
          value: "debug"
        - name: LOG_FORMAT
          value: "json"
        - name: TRANSCRIBE_TEMP_DIR
          value: "/tmp/audio"

      istio:
        enabled: true

      resources:
        requests:
          ephemeral-storage: 1Gi
          cpu: 250m
          memory: 128Mi
        limits:
          ephemeral-storage: 4Gi
          cpu: 1000m
          memory: 512Mi

      infisicalSecret:
        enabled: true
        secretName: "ai-gateway-secrets"
        projectSlug: "ai-gateway-x5-yk"
        envSlug: "staging"

      envFrom:
        - secretRef:
            name: ai-gateway-secrets

      volumes:
        - name: temp-audio
          emptyDir: {}

      volumeMounts:
        - name: temp-audio
          mountPath: /tmp/audio

      podAnnotations:
        secrets.infisical.com/auto-reload: "true"

      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      podDisruptionBudget:
        enabled: true
        minAvailable: 1

      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        keda:
          enabled: true
          triggerAuthentication:
            name: keda-trigger-auth-rabbitmq-conn
            secretTargetRef:
              - parameter: username
                name: ai-gateway-secrets
                key: RABBITMQ_USER
              - parameter: password
                name: ai-gateway-secrets
                key: RABBITMQ_PASSWORD
          triggers:
            - type: rabbitmq
              metadata:
                protocol: http
                host: "http://ai-gateway-rabbitmq.ai-gateway-staging.svc.cluster.local:15672"
                queueName: user_messages
                mode: QueueLength
                value: "100"
              authenticationRef:
                name: keda-trigger-auth-rabbitmq-conn
